<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
 :root {
  --overlay-left: 20px;
  --overlay-top: 20px;
  --overlay-estimated-width: 560px;
  --panel-gap: 14px;

  --panel-radius: 16px;
  --panel-solid-bg: rgba(12, 15, 27, 0.88);
  --panel-solid-border: rgba(255, 255, 255, 0.12);
  --panel-solid-shadow: 0 18px 60px rgba(0, 0, 0, 0.32);

  --glass-bg: rgba(255, 255, 255, 0.08);
  --glass-border: rgba(255, 255, 255, 0.15);
  --glass-blur: 12px;
  --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
 }

html,
body {
  margin: 0;
  padding: 0;
  background: transparent !important;
  overflow: hidden;
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}

html.overlay-only,
body.overlay-only {
  background: transparent !important;
}

body.overlay-only .config-panel {
  display: none !important;
}

body.overlay-only .overlay {
  top: 0 !important;
  left: 0 !important;
  max-width: 100% !important;
}

body.overlay-only.overlay-only-force-transparent-panel .panel {
  background: transparent !important;
  border: none !important;
  border-color: transparent !important;
  box-shadow: none !important;
  backdrop-filter: none !important;
  -webkit-backdrop-filter: none !important;
}

/* OBS Browser Source can render moving black rectangles when backdrop-filter
   is combined with animations/transforms. Keep the glass tint, but disable
   backdrop blur + heavy shadow in overlay-only mode to prevent artifacts. */
html.obs-browser body.overlay-only .panel.theme-glass,
body.obs-browser.overlay-only .panel.theme-glass {
  backdrop-filter: none !important;
  -webkit-backdrop-filter: none !important;
  box-shadow: none !important;
  will-change: auto !important;
}

body.overlay-only .panel.theme-glass {
  backdrop-filter: none !important;
  -webkit-backdrop-filter: none !important;
  box-shadow: none !important;
  will-change: auto !important;
}

.overlay {
  position: absolute;
  top: 20px;
  left: 20px;
  width: auto;
  max-width: calc(100% - 40px);
  color: #eef2ff;
  z-index: 2;
}

.overlay-root {
  width: 100vw;
  height: 100vh;
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

@media (max-width: 660px) {
  .overlay {
    left: 10px;
    top: 10px;
  }
  .body-row {
    flex-direction: column;
  }
  .config-row {
    overflow-x: visible;
  }
  .config-actions {
    flex-direction: column;
    align-items: stretch;
  }
  .config-panel {
    left: 10px;
    top: 248px;
    width: calc(100vw - 20px);
    max-height: calc(100vh - 260px);
  }
}

.panel {
  width: fit-content;
  max-width: 100%;
  padding: 18px 20px;
  border-radius: var(--panel-radius);
  background: transparent;
  border: 1px solid var(--panel-solid-border);
  box-shadow: var(--panel-solid-shadow);
}

.panel.theme-solid {
  background: var(--panel-solid-bg) !important;
  border-color: var(--panel-solid-border);
  box-shadow: var(--panel-solid-shadow);
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
}

.panel.theme-transparent {
  background: transparent !important;
  border-color: transparent !important;
  border-width: 0 !important;
  box-shadow: none !important;
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
}

.panel.theme-glass,
.glass-card,
.glass-panel {
  background: var(--glass-bg) !important;
  border-color: var(--glass-border);
  box-shadow: var(--glass-shadow);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
  will-change: backdrop-filter;
}

@supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
  .panel.theme-glass,
  .glass-card,
  .glass-panel {
    background: rgba(255, 255, 255, 0.08) !important;
  }
}

.top-row,
.body-row,
.history-row {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}

.rank-card,
.status-card,
.score-card {
  display: flex;
  align-items: center;
  gap: 14px;
}

.rank-card {
  flex: 1 1 320px;
}

.rank-img {
  width: 84px;
  height: 84px;
  border-radius: 20px;
  object-fit: cover;
  transition: transform 0.35s ease, filter 0.35s ease;
  filter: drop-shadow(0 0 16px rgba(76, 255, 154, 0));
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  transform-origin: center;
  will-change: transform, filter;
}

.rank-img.animate {
  transform: scale(1.12);
  filter: drop-shadow(0 0 22px rgba(76, 255, 154, 0.8));
  animation: rank-glimmer 0.9s ease, rank-flip 0.9s ease;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}

@keyframes rank-glimmer {
  0%, 100% {
    filter: drop-shadow(0 0 18px rgba(76, 255, 154, 0.4));
    box-shadow: 0 0 0 rgba(76, 255, 154, 0);
  }
  50% {
    filter: drop-shadow(0 0 28px rgba(76, 255, 154, 1));
    box-shadow: 0 0 32px rgba(76, 255, 154, 0.35);
  }
}

@keyframes rank-flip {
  0% {
    transform: scale(1.0) scaleX(1);
  }
  40% {
    transform: scale(1.08) scaleX(0.05);
  }
  60% {
    transform: scale(1.08) scaleX(0.05);
  }
  100% {
    transform: scale(1.0) scaleX(1);
  }
}

.rank-info {
  display: grid;
  gap: 6px;
}

.rank-name {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 0.02em;
}

.rank-subtitle {
  font-size: 13px;
  color: #9ca3af;
}

.status-card {
  flex: 1 1 260px;
  justify-content: flex-end;
}


.status-box {
  width: 100%;
  padding: 0;
  border-radius: 0;
  background: transparent;
  border: none;
}

.status-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  width: 100%;
}

.status-row.compact {
  justify-content: flex-end;
}

.status-text {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.status-label {
  color: #94a3b8;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.14em;
}

.status {
  font-size: 13px;
  font-weight: 700;
}

.status.online { color: #4cff9a; }
.status.offline { color: #ff5c5c; }
.status.loading { color: #f8cd69; }

.last-updated {
  margin: 0;
  font-size: 11px;
  color: #94a3b8;
  white-space: nowrap;
  opacity: 0.9;
}

.rank-name,
.rr-value,
.rank-separator,
.rank-subtitle,
.rr-label,
.status,
.status-label,
.last-updated {
  text-shadow: 0 1px 2px rgba(0, 0, 0, 0.45), 0 0 8px rgba(0, 0, 0, 0.2);
}

.top-row {
  justify-content: flex-start;
}

.body-row {
  margin-top: 16px;
  align-items: flex-start;
}

.agents-row {
  margin-top: 14px;
  display: grid;
  gap: 8px;
}

.agent-history {
  display: flex;
  gap: 8px;
  flex-wrap: nowrap;
  overflow-x: auto;
  scrollbar-width: thin;
}

.agent-item {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  overflow: hidden;
  background: rgba(255, 255, 255, 0.16);
  border: 1px solid rgba(255, 255, 255, 0.25);
}

.agent-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.rank-card {
  flex: 0 0 auto;
  align-items: flex-start;
}

.rank-info {
  display: flex;
  flex-direction: column;
  width: 420px;
  max-width: calc(100vw - 160px);
  gap: 12px;
}

.rank-rating-block {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.rr-label {
  font-size: 11px;
  color: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.14em;
}

.rank-value-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.rank-name,
.rr-value,
.rank-separator {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 0.02em;
  color: inherit;
}

.rank-separator {
  font-size: 24px;
}

.progress-bar {
  width: 420px;
  max-width: 420px;
  height: 10px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.08);
  overflow: hidden;
}

.score-card {
  display: none;
}

.stats-grid {
  display: none;
}

.progress-fill {
  width: 0%;
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, #4cff9a 0%, #22c55e 100%);
  transition: width 0.35s ease;
}

.config-panel {
  position: absolute;
  left: calc(var(--overlay-left) + var(--overlay-estimated-width) + var(--panel-gap));
  top: var(--overlay-top);
  width: min(760px, calc(100vw - (var(--overlay-left) + var(--overlay-estimated-width) + var(--panel-gap)) - 20px));
  max-height: calc(100vh - 40px);
  overflow: auto;
  padding: 22px;
  border-radius: 24px;
  background: linear-gradient(165deg, rgba(12, 18, 33, 0.92), rgba(19, 32, 56, 0.9));
  border: 1px solid rgba(148, 163, 184, 0.3);
  box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(10px);
}

.config-panel.below-overlay {
  left: var(--overlay-left);
  top: calc(var(--overlay-top) + var(--overlay-estimated-height) + var(--panel-gap));
}

@media (max-width: 1360px) {
  .config-panel {
    left: 20px;
    top: 248px;
    width: calc(100vw - 40px);
    max-height: calc(100vh - 260px);
  }
}

.config-heading {
  font-size: 18px;
  font-weight: 800;
  margin: 0 0 16px;
  color: #f8fafc;
  letter-spacing: 0.01em;
}

.config-group {
  display: grid;
  gap: 10px;
  margin-bottom: 12px;
  padding: 12px;
  border-radius: 16px;
  background: rgba(15, 23, 42, 0.5);
  border: 1px solid rgba(148, 163, 184, 0.24);
}

.config-group:last-of-type {
  margin-bottom: 0;
}

.glass-config-group {
  display: none;
}

.glass-config-group.visible {
  display: grid;
}

.config-group-title {
  font-size: 12px;
  color: #cbd5e1;
  text-transform: uppercase;
  letter-spacing: 0.09em;
  font-weight: 700;
}

.config-row {
  display: flex;
  flex-wrap: wrap;
  gap: 9px;
  align-items: stretch;
  overflow-x: visible;
}

.config-item {
  display: flex;
  flex: 1 1 220px;
  min-width: 220px;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  min-height: 36px;
  padding: 6px 8px;
  border-radius: 12px;
  background: rgba(30, 41, 59, 0.45);
  border: 1px solid rgba(148, 163, 184, 0.18);
}

.config-item label {
  flex: 1;
  font-size: 11px;
  color: #dbeafe;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  font-weight: 700;
  white-space: normal;
  line-height: 1.2;
}

.config-input,
.config-select {
  height: 30px;
  min-width: 112px;
  max-width: 156px;
  width: 100%;
  border-radius: 10px;
  border: 1px solid rgba(148, 163, 184, 0.35);
  padding: 0 10px;
  background: rgba(15, 23, 42, 0.95);
  color: #f1f5f9;
  font-family: inherit;
  font-size: 12px;
}

.config-item .config-input,
.config-item .config-select {
  flex: 0 1 156px;
}

.api-key-config-item {
  flex: 1 1 100%;
  min-width: 100%;
  align-items: center;
  flex-wrap: nowrap;
}

.api-key-config-item label {
  flex: 0 0 138px;
  white-space: nowrap;
}

.api-key-config-item .config-input {
  max-width: none;
  flex: 1 1 auto;
  min-width: 0;
}

.api-key-inline-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: nowrap;
  flex: 1 1 auto;
  min-width: 0;
}

.api-key-visibility-btn {
  width: 30px;
  min-width: 30px;
  height: 30px;
  padding: 0;
  border-radius: 10px;
  border: 1px solid rgba(148, 163, 184, 0.35);
  background: rgba(15, 23, 42, 0.95);
  color: #dbeafe;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.api-key-visibility-btn svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.api-key-visibility-btn .eye-off-mark {
  display: none;
}

.api-key-visibility-btn.is-visible .eye-off-mark {
  display: inline;
}

#overlayBackgroundThemeInput {
  max-width: 190px;
  flex-basis: 190px;
}

.config-input[type="range"] {
  min-width: 120px;
  max-width: 160px;
  accent-color: #38bdf8;
  padding: 0;
  background: transparent;
  border: none;
}

.config-range-value {
  min-width: 42px;
  text-align: right;
  font-size: 11px;
  color: #bfdbfe;
  font-weight: 700;
}

.glass-config-group .config-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  gap: 10px;
}

.glass-config-item {
  display: grid;
  grid-template-columns: 1fr auto;
  grid-template-areas:
    "label value"
    "slider slider";
  align-items: center;
  gap: 6px 8px;
  min-width: 230px;
}

.glass-config-item label {
  grid-area: label;
  white-space: normal;
  line-height: 1.2;
}

.glass-config-item .config-range-value {
  grid-area: value;
  min-width: 46px;
}

.glass-config-item .config-input[type="range"] {
  grid-area: slider;
  width: 100%;
  min-width: 0;
  max-width: none;
}

.config-select {
  background: rgba(11, 18, 32, 0.4);
  color: #f8fafc;
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255, 255, 255, 0.1);
}

.config-select option {
  background: #0b1220;
  color: #f8fafc;
}

.config-input[type="color"] {
  min-width: 32px;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  padding: 0;
  overflow: hidden;
  cursor: pointer;
  border: 2px solid rgba(226, 232, 240, 0.6);
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
  -webkit-appearance: none;
  appearance: none;
  background: transparent;
}

.config-input[type="color"]::-webkit-color-swatch-wrapper {
  padding: 0;
  border-radius: 50%;
}

.config-input[type="color"]::-webkit-color-swatch {
  border: none;
  border-radius: 50%;
}

.config-input[type="color"]::-moz-color-swatch {
  border: none;
  border-radius: 50%;
}

.color-input-hidden {
  position: absolute;
  width: 1px;
  height: 1px;
  opacity: 0;
  pointer-events: none;
}

.color-circle-button {
  width: 28px;
  height: 28px;
  min-width: 28px;
  min-height: 28px;
  border-radius: 50%;
  border: 1px solid rgba(226, 232, 240, 0.72);
  background: #0c0f1b;
  cursor: pointer;
  padding: 0;
  appearance: none;
  -webkit-appearance: none;
  outline: none;
  box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.35);
}

.color-circle-button:hover,
.color-circle-button:focus-visible {
  border-color: #e2e8f0;
  box-shadow: 0 0 0 2px rgba(226, 232, 240, 0.34);
}

.color-circle-button.selected {
  border-color: #f8fafc;
  box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.55);
}

.config-input[type="checkbox"] {
  min-width: 18px;
  width: 18px;
  height: 18px;
  accent-color: #4cff9a;
}

.config-actions {
  margin-top: 18px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}

.config-button {
  padding: 9px 18px;
  border-radius: 999px;
  border: none;
  background: linear-gradient(120deg, #4cff9a, #22d3ee);
  color: #08110a;
  font-family: inherit;
  font-weight: 700;
  letter-spacing: 0.01em;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(34, 211, 238, 0.25);
}

.config-button:hover {
  filter: brightness(1.04);
}

.config-status {
  font-size: 12px;
  color: #cbd5e1;
  font-weight: 600;
}

.config-status.success {
  color: #4cff9a;
}

.config-status.error {
  color: #ff7b7b;
}

.history-row {
  margin-top: 18px;
  flex-direction: column;
}

.section-title {
  font-size: 12px;
  color: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 10px;
}

.history {
  display: flex;
  gap: 10px;
  flex-wrap: nowrap;
  overflow-x: auto;
  scrollbar-width: thin;
}

.history-item {
  min-width: 44px;
  padding: 0 7px;
  height: 32px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 700;
  line-height: 1;
  letter-spacing: 0.01em;
  font-variant-numeric: tabular-nums;
  text-rendering: geometricPrecision;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  color: #111827;
}

.history-agent {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  object-fit: cover;
  background: rgba(255, 255, 255, 0.2);
  box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.26);
}

.history-value {
  display: inline-block;
}

.history-item.gain { background: #4cff9a; text-shadow: 0 1px 0 rgba(255, 255, 255, 0.28); }
.history-item.loss { background: #ff5c5c; color: #ffffff; text-shadow: 0 1px 1px rgba(0, 0, 0, 0.35); }
.history-item.neutral { background: rgba(148, 163, 184, 0.24); color: #eef2ff; }
</style>
</head>

<body>
<div class="overlay-root">
<div class="overlay">
  <div class="panel">
    <div class="top-row">
      <div class="status-card">
        <div class="status-box">
          <div class="status-row">
            <div id="statusText" class="status-text">
              <div class="status-label">Connection</div>
              <div id="status" class="status loading">Connecting...</div>
            </div>
            <div id="lastUpdated" class="last-updated">Last updated: --</div>
          </div>
        </div>
      </div>
    </div>

    <div id="agentRow" class="agents-row">
      <div id="agentHistory" class="agent-history"></div>
    </div>

    <div class="body-row">
      <div class="rank-card">
        <img id="rankImg" class="rank-img" src="" alt="Rank icon">
        <div class="rank-info">
          <div class="rank-rating-block">
            <div class="rr-label">Rank Rating</div>
            <div class="rank-value-row">
              <div id="rank" class="rank-name">Loading...</div>
              <div class="rank-separator">-</div>
              <div id="rr" class="rr-value">--</div>
            </div>
            <div id="division" class="rank-subtitle">Valorant rank tracker</div>
          </div>
          <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
        </div>
      </div>
    </div>
    <div class="history-row">
      <div id="history" class="history"></div>
    </div>
  </div>
</div>

<div class="config-panel">
  <div class="config-heading">Overlay Settings</div>
  <div class="config-group">
    <div class="config-group-title">Player</div>
    <div class="config-row">
      <div class="config-item">
        <label for="playerNameInput">Player name</label>
        <input id="playerNameInput" class="config-input" type="text" placeholder="YourName">
      </div>
      <div class="config-item">
        <label for="playerTagInput">Player tag</label>
        <input id="playerTagInput" class="config-input" type="text" placeholder="0000">
      </div>
      <div class="config-item">
        <label for="playerRegionInput">Region</label>
        <select id="playerRegionInput" class="config-select">
          <option value="ap">AP</option>
          <option value="eu">EU</option>
          <option value="na">NA</option>
          <option value="kr">KR</option>
          <option value="latam">LATAM</option>
          <option value="br">BR</option>
        </select>
      </div>
      <div class="config-item api-key-config-item">
        <label for="apiKeyInput">HenrikDev API key</label>
        <div class="api-key-inline-actions">
          <input id="apiKeyInput" class="config-input" type="password" placeholder="Enter HDEV-..." autocomplete="off" spellcheck="false">
          <button id="apiKeyVisibilityBtn" class="api-key-visibility-btn" type="button" aria-label="Show API key" title="Show API key">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M2 12s3.5-6 10-6s10 6 10 6s-3.5 6-10 6s-10-6-10-6"></path>
              <circle cx="12" cy="12" r="3"></circle>
              <line class="eye-off-mark" x1="4" y1="20" x2="20" y2="4"></line>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="config-group">
    <div class="config-group-title">Theme</div>
    <div class="config-row">
      <div class="config-item">
        <label for="bgColorInput">Background color</label>
        <button id="bgColorButton" type="button" class="color-circle-button selected" aria-label="Background color picker"></button>
        <input id="bgColorInput" class="config-input color-input-hidden" type="color" value="#0c0f1b">
      </div>
      <div class="config-item">
        <label for="textColorInput">Text color</label>
        <button id="textColorButton" type="button" class="color-circle-button selected" aria-label="Text color picker"></button>
        <input id="textColorInput" class="config-input color-input-hidden" type="color" value="#eef2ff">
      </div>
      <div class="config-item">
        <label for="overlayBackgroundThemeInput">Background theme</label>
        <select id="overlayBackgroundThemeInput" class="config-select">
          <option value="solid">Solid</option>
          <option value="transparent">Transparent</option>
          <option value="glass">Glass</option>
        </select>
      </div>
    </div>
  </div>

  <div id="glassConfigGroup" class="config-group glass-config-group">
    <div class="config-group-title">Glass Theme</div>
    <div class="config-row">
      <div class="config-item">
        <label for="glassTintColorInput">Glass color</label>
        <button id="glassTintColorButton" type="button" class="color-circle-button selected" aria-label="Glass tint color picker"></button>
        <input id="glassTintColorInput" class="config-input color-input-hidden" type="color" value="#ffffff">
      </div>
      <div class="config-item glass-config-item">
        <label for="glassBlurPxInput">Glass blur</label>
        <span id="glassBlurPxValue" class="config-range-value">14px</span>
        <input id="glassBlurPxInput" class="config-input" type="range" min="4" max="20" step="1" value="14">
      </div>
      <div class="config-item glass-config-item">
        <label for="glassTintOpacityInput">Glass tint</label>
        <span id="glassTintOpacityValue" class="config-range-value">0.12</span>
        <input id="glassTintOpacityInput" class="config-input" type="range" min="0.05" max="0.75" step="0.01" value="0.18">
      </div>
      <div class="config-item glass-config-item">
        <label for="glassBorderOpacityInput">Glass border</label>
        <span id="glassBorderOpacityValue" class="config-range-value">0.34</span>
        <input id="glassBorderOpacityInput" class="config-input" type="range" min="0.12" max="0.70" step="0.01" value="0.34">
      </div>
      <div class="config-item glass-config-item">
        <label for="glassShadowStrengthInput">Glass depth</label>
        <span id="glassShadowStrengthValue" class="config-range-value">0.42</span>
        <input id="glassShadowStrengthInput" class="config-input" type="range" min="0.20" max="0.80" step="0.01" value="0.42">
      </div>
    </div>
  </div>

  <div class="config-group">
    <div class="config-group-title">Visibility</div>
    <div class="config-row">
      <div class="config-item">
        <label for="showConnectionInput">Show connection</label>
        <input id="showConnectionInput" class="config-input" type="checkbox" checked>
      </div>
      <div class="config-item">
        <label for="showLastUpdatedInput">Show last updated</label>
        <input id="showLastUpdatedInput" class="config-input" type="checkbox" checked>
      </div>
      <div class="config-item">
        <label for="showAgentIconsInput">Show agent icons</label>
        <input id="showAgentIconsInput" class="config-input" type="checkbox" checked>
      </div>
    </div>
  </div>

  <div class="config-group">
    <div class="config-group-title">Data</div>
    <div class="config-row">
      <div class="config-item">
        <label for="maxMatchResultsInput">Max games shown (1-10)</label>
        <input id="maxMatchResultsInput" class="config-input" type="number" min="1" max="10" step="1" value="10">
      </div>
      <div class="config-item">
        <label for="trackingDayResetTimeInput">Day reset time (24h)</label>
        <select id="trackingDayResetTimeInput" class="config-select"></select>
      </div>
    </div>
  </div>

  <div class="config-actions">
    <button id="saveConfigBtn" class="config-button" type="button">Save config</button>
    <div id="saveStatus" class="config-status">Ready</div>
  </div>
</div>
</div>

<script>
const API_PATH = "/rank";
const CONFIG_PATH = "/config";
const DEFAULT_IMAGE_PATH = "/assets/rank-images/";
const DEFAULT_BG_COLOR = "#0c0f1b";
const DEFAULT_TEXT_COLOR = "#eef2ff";
const DEFAULT_BORDER_STYLE = "solid";
const DEFAULT_OVERLAY_BACKGROUND_THEME = "solid";
const DEFAULT_GLASS_BLUR_PX = 14;
const DEFAULT_GLASS_TINT_COLOR = "#ffffff";
const DEFAULT_GLASS_TINT_OPACITY = 0.18;
const DEFAULT_GLASS_BORDER_OPACITY = 0.34;
const DEFAULT_GLASS_SHADOW_STRENGTH = 0.42;
const DEFAULT_TRACKING_RESET_TIME = "00:00";

let displayedRR = null;
let targetRR = null;
let rrAnimationFrame = null;
let lastTier = null;
let rankImageBasePath = DEFAULT_IMAGE_PATH;
let rankAnimationIntervalMs = 15000;
let rankAnimationTimer = null;
let activeRankAnimationIntervalMs = null;
let lastConnectedOrigin = "";
let maxMatchResults = 10;
let showAgentIcons = true;
let currentBackgroundColor = DEFAULT_BG_COLOR;
let currentTextColor = DEFAULT_TEXT_COLOR;
let currentBorderStyle = DEFAULT_BORDER_STYLE;
let currentOverlayBackgroundTheme = DEFAULT_OVERLAY_BACKGROUND_THEME;
let currentGlassSettings = {
  blurPx: DEFAULT_GLASS_BLUR_PX,
  tintColor: DEFAULT_GLASS_TINT_COLOR,
  tintOpacity: DEFAULT_GLASS_TINT_OPACITY,
  borderOpacity: DEFAULT_GLASS_BORDER_OPACITY,
  shadowStrength: DEFAULT_GLASS_SHADOW_STRENGTH
};
let hasConfiguredApiKey = false;
const LAST_AGENT_COUNT = 10;

function isOverlayOnlyMode() {
  try {
    const params = new URLSearchParams(window.location.search || "");
    const value = String(params.get("overlayOnly") || params.get("obs") || "").trim().toLowerCase();
    return value === "1" || value === "true" || value === "yes";
  } catch {
    return false;
  }
}

function shouldForceTransparentPanelInOverlayOnlyMode() {
  try {
    const params = new URLSearchParams(window.location.search || "");
    const value = String(params.get("transparentPanel") || "").trim().toLowerCase();
    return value === "1" || value === "true" || value === "yes";
  } catch {
    return false;
  }
}

function isObsBrowser() {
  try {
    const ua = String(navigator.userAgent || "").toLowerCase();
    return ua.includes("obs") || ua.includes("obssource") || ua.includes("obsbrowser");
  } catch {
    return false;
  }
}

function syncConfigPanelLayout() {
  const overlay = document.querySelector(".overlay");
  const panel = document.querySelector(".config-panel");
  if (!overlay || !panel) return;
  if (isOverlayOnlyMode()) return;

  const overlayRect = overlay.getBoundingClientRect();
  const viewportWidth = window.innerWidth || document.documentElement.clientWidth || 0;
  const viewportHeight = window.innerHeight || document.documentElement.clientHeight || 0;
  const gap = 14;
  const sidePadding = 20;
  const rightSpace = viewportWidth - overlayRect.right - gap - sidePadding;
  const canFitRight = rightSpace >= 300;

  document.documentElement.style.setProperty("--overlay-left", `${Math.max(10, overlayRect.left)}px`);
  document.documentElement.style.setProperty("--overlay-top", `${Math.max(10, overlayRect.top)}px`);
  document.documentElement.style.setProperty("--overlay-estimated-width", `${Math.max(300, overlayRect.width)}px`);
  document.documentElement.style.setProperty("--overlay-estimated-height", `${Math.max(120, overlayRect.height)}px`);

  if (canFitRight) {
    panel.classList.remove("below-overlay");
    panel.style.left = `${Math.max(10, overlayRect.right + gap)}px`;
    panel.style.top = `${Math.max(10, overlayRect.top)}px`;
    panel.style.width = `${Math.max(300, Math.min(760, rightSpace))}px`;
    panel.style.maxHeight = `${Math.max(220, viewportHeight - overlayRect.top - sidePadding)}px`;
    return;
  }

  panel.classList.add("below-overlay");
  panel.style.left = `${Math.max(10, overlayRect.left)}px`;
  panel.style.top = `${Math.max(10, overlayRect.bottom + gap)}px`;
  panel.style.width = `${Math.max(300, viewportWidth - Math.max(10, overlayRect.left) - sidePadding)}px`;
  panel.style.maxHeight = `${Math.max(180, viewportHeight - (overlayRect.bottom + gap) - sidePadding)}px`;
}

function getRequestOrigins() {
  const origins = [];
  if (window.location && /^https?:$/.test(window.location.protocol)) {
    origins.push(window.location.origin);
  }
  origins.push("http://127.0.0.1:3000");
  origins.push("http://localhost:3000");
  origins.push("http://127.0.0.1:3001");
  origins.push("http://localhost:3001");
  return [...new Set(origins)];
}

function getCandidateUrls(pathOrUrl) {
  if (/^https?:\/\//i.test(pathOrUrl)) {
    return [pathOrUrl];
  }
  const normalizedPath = pathOrUrl.startsWith("/") ? pathOrUrl : `/${pathOrUrl}`;
  return getRequestOrigins().map(origin => `${origin}${normalizedPath}`);
}

function buildRankImageUrl(basePath, fileName) {
  if (!fileName) return "";

  const safeBase = typeof basePath === "string" ? basePath : "";
  if (/^https?:\/\//i.test(safeBase) || safeBase.startsWith("file:///")) {
    return safeBase + fileName;
  }

  if (safeBase.startsWith("/")) {
    const origin = lastConnectedOrigin || (window.location && /^https?:$/.test(window.location.protocol)
      ? window.location.origin
      : "http://127.0.0.1:3000");
    return `${origin}${safeBase}${fileName}`;
  }

  return safeBase + fileName;
}

function resolveRankIconUrl(rankPayload, imageBasePath, tier) {
  const localIcon = buildRankImageUrl(imageBasePath, getRankImage(tier));
  const remoteIcon = rankPayload?.images?.large || rankPayload?.images?.small || "";

  // OBS often blocks file:// URLs; prefer https icon when local filesystem path is used.
  if (typeof imageBasePath === "string" && imageBasePath.startsWith("file:///")) {
    return remoteIcon || localIcon;
  }

  return localIcon || remoteIcon;
}

function getRankImage(tier) {
  if (!tier) return "";
  if (tier === "Radiant") return "Radiant_Rank.png";
  return tier.replace(/\s+/g, "_") + "_Rank.png";
}

function animateRankIcon() {
  const img = document.getElementById("rankImg");
  img.classList.remove("animate");
  void img.offsetWidth;

  const cleanup = () => {
    img.classList.remove("animate");
    img.removeEventListener("animationend", cleanup);
  };

  img.addEventListener("animationend", cleanup);
  img.classList.add("animate");
}

function scheduleRankAnimation(intervalMs) {
  if (!Number.isFinite(intervalMs) || intervalMs <= 0) {
    intervalMs = 15000;
  }
  if (activeRankAnimationIntervalMs === intervalMs && rankAnimationTimer) {
    return;
  }
  activeRankAnimationIntervalMs = intervalMs;
  clearInterval(rankAnimationTimer);
  rankAnimationIntervalMs = intervalMs;
  rankAnimationTimer = setInterval(animateRankIcon, rankAnimationIntervalMs);
}

function normalizeOverlayBackgroundTheme(value, transparentOverlay) {
  const normalized = String(value || "").trim().toLowerCase();
  if (normalized === "solid" || normalized === "transparent" || normalized === "glass") {
    return normalized;
  }
  if (transparentOverlay === true) {
    return "transparent";
  }
  return DEFAULT_OVERLAY_BACKGROUND_THEME;
}

function clampNumber(value, min, max, fallback) {
  const parsed = Number(value);
  if (!Number.isFinite(parsed)) return fallback;
  return Math.max(min, Math.min(max, parsed));
}

function getNormalizedGlassSettings(source) {
  return {
    blurPx: Math.round(clampNumber(source?.glassBlurPx, 4, 20, DEFAULT_GLASS_BLUR_PX)),
    tintColor: normalizeHexColor(source?.glassTintColor) || DEFAULT_GLASS_TINT_COLOR,
    tintOpacity: clampNumber(source?.glassTintOpacity, 0.05, 0.75, DEFAULT_GLASS_TINT_OPACITY),
    borderOpacity: clampNumber(source?.glassBorderOpacity, 0.12, 0.7, DEFAULT_GLASS_BORDER_OPACITY),
    shadowStrength: clampNumber(source?.glassShadowStrength, 0.2, 0.8, DEFAULT_GLASS_SHADOW_STRENGTH)
  };
}

function getSavedThemeFromStorage() {
  try {
    const savedTheme = localStorage.getItem("overlayBackgroundTheme");
    if (!savedTheme) return DEFAULT_OVERLAY_BACKGROUND_THEME;
    return normalizeOverlayBackgroundTheme(savedTheme, false);
  } catch {
    return DEFAULT_OVERLAY_BACKGROUND_THEME;
  }
}

function saveThemeToStorage(theme) {
  try {
    localStorage.setItem("overlayBackgroundTheme", theme);
  } catch {
    // Ignore storage errors in locked-down browser contexts.
  }
}

function updateGlassRangeValueBubbles() {
  const blurInput = document.getElementById("glassBlurPxInput");
  const tintInput = document.getElementById("glassTintOpacityInput");
  const borderInput = document.getElementById("glassBorderOpacityInput");
  const shadowInput = document.getElementById("glassShadowStrengthInput");
  const blurValue = document.getElementById("glassBlurPxValue");
  const tintValue = document.getElementById("glassTintOpacityValue");
  const borderValue = document.getElementById("glassBorderOpacityValue");
  const shadowValue = document.getElementById("glassShadowStrengthValue");

  if (blurInput && blurValue) blurValue.textContent = `${Math.round(Number(blurInput.value) || DEFAULT_GLASS_BLUR_PX)}px`;
  if (tintInput && tintValue) tintValue.textContent = Number(tintInput.value || DEFAULT_GLASS_TINT_OPACITY).toFixed(2);
  if (borderInput && borderValue) borderValue.textContent = Number(borderInput.value || DEFAULT_GLASS_BORDER_OPACITY).toFixed(2);
  if (shadowInput && shadowValue) shadowValue.textContent = Number(shadowInput.value || DEFAULT_GLASS_SHADOW_STRENGTH).toFixed(2);
}

function normalizeHexColor(value) {
  if (typeof value !== "string") return "";
  const trimmed = value.trim().toLowerCase();
  return /^#([0-9a-f]{6})$/.test(trimmed) ? trimmed : "";
}

function hexToRgb(hex) {
  const normalized = normalizeHexColor(hex);
  if (!normalized) return { r: 255, g: 255, b: 255 };
  const value = normalized.slice(1);
  return {
    r: Number.parseInt(value.slice(0, 2), 16),
    g: Number.parseInt(value.slice(2, 4), 16),
    b: Number.parseInt(value.slice(4, 6), 16)
  };
}

function setColorCircleButtonValue(button, colorValue) {
  if (!button) return;
  const normalized = normalizeHexColor(colorValue) || "#000000";
  button.style.background = normalized;
  button.classList.add("selected");
}

function previewThemeFromInputs() {
  const bgColor = document.getElementById("bgColorInput")?.value || currentBackgroundColor;
  const textColor = document.getElementById("textColorInput")?.value || currentTextColor;
  const selectedTheme = normalizeOverlayBackgroundTheme(document.getElementById("overlayBackgroundThemeInput")?.value, false);
  const nextGlassSettings = {
    glassBlurPx: document.getElementById("glassBlurPxInput")?.value,
    glassTintColor: document.getElementById("glassTintColorInput")?.value,
    glassTintOpacity: document.getElementById("glassTintOpacityInput")?.value,
    glassBorderOpacity: document.getElementById("glassBorderOpacityInput")?.value,
    glassShadowStrength: document.getElementById("glassShadowStrengthInput")?.value
  };

  applyTheme(bgColor, textColor, currentBorderStyle, selectedTheme, selectedTheme === "transparent", nextGlassSettings);
}

function initializeColorCircleButtons() {
  const pairs = [
    { buttonId: "bgColorButton", inputId: "bgColorInput" },
    { buttonId: "textColorButton", inputId: "textColorInput" },
    { buttonId: "glassTintColorButton", inputId: "glassTintColorInput" }
  ];

  pairs.forEach(({ buttonId, inputId }) => {
    const button = document.getElementById(buttonId);
    const input = document.getElementById(inputId);
    if (!button || !input) return;

    setColorCircleButtonValue(button, input.value);

    button.addEventListener("click", () => {
      input.click();
    });

    input.addEventListener("input", () => {
      setColorCircleButtonValue(button, input.value);
      previewThemeFromInputs();
    });
  });
}

function toggleGlassConfigVisibility(themeValue) {
  const glassGroup = document.getElementById("glassConfigGroup");
  if (!glassGroup) return;
  const normalizedTheme = normalizeOverlayBackgroundTheme(themeValue, false);
  glassGroup.classList.toggle("visible", normalizedTheme === "glass");
}

function applyTheme(backgroundColor, textColor, borderStyle, overlayBackgroundTheme, transparentOverlay, glassSettings) {
  const panel = document.querySelector(".panel");
  const overlay = document.querySelector(".overlay");
  const hasThemeValue = typeof overlayBackgroundTheme === "string" && overlayBackgroundTheme.trim() !== "";
  const theme = normalizeOverlayBackgroundTheme(
    hasThemeValue ? overlayBackgroundTheme : currentOverlayBackgroundTheme,
    transparentOverlay
  );
  currentOverlayBackgroundTheme = theme;
  saveThemeToStorage(theme);
  const normalizedGlassSettings = getNormalizedGlassSettings(glassSettings || currentGlassSettings);
  currentGlassSettings = normalizedGlassSettings;
  const bgColor = typeof backgroundColor === "string" && backgroundColor.trim()
    ? backgroundColor
    : currentBackgroundColor;
  const textCol = typeof textColor === "string" && textColor.trim()
    ? textColor
    : currentTextColor;
  const border = typeof borderStyle === "string" && borderStyle.trim()
    ? borderStyle
    : currentBorderStyle;

  currentBackgroundColor = bgColor || DEFAULT_BG_COLOR;
  currentTextColor = textCol || DEFAULT_TEXT_COLOR;
  currentBorderStyle = border || DEFAULT_BORDER_STYLE;

  panel.classList.remove("theme-solid", "theme-transparent", "theme-glass");
  panel.classList.add(`theme-${theme}`);

  if (theme === "transparent") {
    panel.style.removeProperty("--glass-bg");
    panel.style.removeProperty("--glass-border");
    panel.style.removeProperty("--glass-blur");
    panel.style.removeProperty("--glass-shadow");
    panel.style.removeProperty("--panel-solid-bg");
    panel.style.removeProperty("--panel-solid-border");
    panel.style.removeProperty("--panel-solid-shadow");
    panel.style.borderStyle = "none";
    panel.style.borderWidth = "0px";
  } else if (theme === "glass") {
    const tint = hexToRgb(normalizedGlassSettings.tintColor);
    const isOverlayOnly = document.body.classList.contains("overlay-only");
    const effectiveTintOpacity = isOverlayOnly
      ? Math.min(0.75, normalizedGlassSettings.tintOpacity + 0.12)
      : normalizedGlassSettings.tintOpacity;
    const effectiveBorderOpacity = isOverlayOnly
      ? Math.min(0.7, normalizedGlassSettings.borderOpacity + 0.08)
      : normalizedGlassSettings.borderOpacity;
    panel.style.setProperty("--glass-bg", `rgba(${tint.r}, ${tint.g}, ${tint.b}, ${effectiveTintOpacity})`);
    panel.style.setProperty("--glass-border", `rgba(255, 255, 255, ${effectiveBorderOpacity})`);
    panel.style.setProperty("--glass-blur", `${normalizedGlassSettings.blurPx}px`);
    panel.style.setProperty("--glass-shadow", `0 8px 32px rgba(0, 0, 0, ${Math.max(0.16, Math.min(0.35, normalizedGlassSettings.shadowStrength))})`);
    panel.style.borderStyle = "solid";
    panel.style.borderWidth = "1px";
  } else {
    panel.style.setProperty("--panel-solid-bg", bgColor);
    panel.style.setProperty("--panel-solid-border", border === "none" ? "transparent" : "rgba(255, 255, 255, 0.12)");
    panel.style.setProperty("--panel-solid-shadow", "0 18px 60px rgba(0, 0, 0, 0.32)");
    panel.style.borderStyle = border;
    panel.style.borderWidth = border === "none" ? "0px" : "1px";
  }

  overlay.style.color = textCol;
  overlay.querySelectorAll(".status-label, .rank-name, .rr-value, .rank-separator, .rank-subtitle, .rr-label, .status, .last-updated").forEach(el => {
    el.style.color = textCol;
  });
  syncConfigPanelLayout();
}

function applyStatusVisibility(showConnection, showLastUpdated) {
  const statusTextEl = document.getElementById("statusText");
  const lastUpdatedEl = document.getElementById("lastUpdated");
  const statusRowEl = document.querySelector(".status-row");
  const statusCardEl = document.querySelector(".status-card");
  const showConn = showConnection !== false;
  const showUpdated = showLastUpdated !== false;

  if (statusTextEl) {
    statusTextEl.style.display = showConn ? "" : "none";
  }
  if (lastUpdatedEl) {
    lastUpdatedEl.style.display = showUpdated ? "" : "none";
  }
  if (statusRowEl) {
    statusRowEl.classList.toggle("compact", (!showConn && showUpdated) || (showConn && !showUpdated));
  }
  if (statusCardEl) {
    statusCardEl.style.display = (!showConn && !showUpdated) ? "none" : "";
  }
}

function clampMatchResults(value) {
  const parsed = Number(value);
  if (!Number.isFinite(parsed)) return 10;
  return Math.max(1, Math.min(10, Math.floor(parsed)));
}

function normalizeTrackingResetTime(value) {
  if (typeof value !== "string") return null;
  const trimmed = value.trim();
  const match = /^(\d{1,2}):(\d{2})$/.exec(trimmed);
  if (!match) return null;
  const hours = Number(match[1]);
  const minutes = Number(match[2]);
  if (!Number.isInteger(hours) || !Number.isInteger(minutes)) return null;
  if (hours < 0 || hours > 23 || minutes < 0 || minutes > 59) return null;
  return `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}`;
}

function populateTrackingResetTimeOptions(selectedTime) {
  const select = document.getElementById("trackingDayResetTimeInput");
  if (!select) return;

  const normalizedSelected = normalizeTrackingResetTime(selectedTime) || DEFAULT_TRACKING_RESET_TIME;
  const options = [];

  for (let hour = 0; hour < 24; hour++) {
    for (let minute = 0; minute < 60; minute += 30) {
      const value = `${String(hour).padStart(2, "0")}:${String(minute).padStart(2, "0")}`;
      options.push(`<option value="${value}">${value}</option>`);
    }
  }

  select.innerHTML = options.join("");
  select.value = normalizedSelected;
}

function setApiKeyFieldMaskState(masked) {
  const apiKeyInput = document.getElementById("apiKeyInput");
  if (!apiKeyInput) return;

  apiKeyInput.dataset.masked = masked ? "true" : "false";
  if (masked) {
    apiKeyInput.value = "********";
    apiKeyInput.placeholder = "";
  } else {
    apiKeyInput.value = "";
    apiKeyInput.placeholder = "Enter HDEV-...";
  }
}

function setApiKeyVisibility(visible) {
  const apiKeyInput = document.getElementById("apiKeyInput");
  const visibilityBtn = document.getElementById("apiKeyVisibilityBtn");
  if (!apiKeyInput || !visibilityBtn) return;

  apiKeyInput.type = visible ? "text" : "password";
  visibilityBtn.classList.toggle("is-visible", visible);
  visibilityBtn.setAttribute("aria-label", visible ? "Hide API key" : "Show API key");
  visibilityBtn.setAttribute("title", visible ? "Hide API key" : "Show API key");
}

function setConfigInputs(backgroundColor, textColor, borderStyle, overlayBackgroundTheme, transparentOverlay, glassBlurPx, glassTintColor, glassTintOpacity, glassBorderOpacity, glassShadowStrength, showConnection, showLastUpdated, showAgentIconsValue, configuredMaxMatchResults, trackingDayResetTime, player, hasApiKey) {
  const bgInput = document.getElementById("bgColorInput");
  const textInput = document.getElementById("textColorInput");
  const overlayBackgroundThemeInput = document.getElementById("overlayBackgroundThemeInput");
  const showConnectionInput = document.getElementById("showConnectionInput");
  const showLastUpdatedInput = document.getElementById("showLastUpdatedInput");
  const showAgentIconsInput = document.getElementById("showAgentIconsInput");
  const maxMatchResultsInput = document.getElementById("maxMatchResultsInput");
  const trackingDayResetTimeInput = document.getElementById("trackingDayResetTimeInput");
  const playerNameInput = document.getElementById("playerNameInput");
  const playerTagInput = document.getElementById("playerTagInput");
  const playerRegionInput = document.getElementById("playerRegionInput");
  const glassBlurPxInput = document.getElementById("glassBlurPxInput");
  const glassTintColorInput = document.getElementById("glassTintColorInput");
  const glassTintOpacityInput = document.getElementById("glassTintOpacityInput");
  const glassBorderOpacityInput = document.getElementById("glassBorderOpacityInput");
  const glassShadowStrengthInput = document.getElementById("glassShadowStrengthInput");
  const bgColorButton = document.getElementById("bgColorButton");
  const textColorButton = document.getElementById("textColorButton");
  const glassTintColorButton = document.getElementById("glassTintColorButton");
  if (bgInput) bgInput.value = backgroundColor || DEFAULT_BG_COLOR;
  if (textInput) textInput.value = textColor || DEFAULT_TEXT_COLOR;
  if (bgInput && bgColorButton) setColorCircleButtonValue(bgColorButton, bgInput.value);
  if (textInput && textColorButton) setColorCircleButtonValue(textColorButton, textInput.value);
  if (overlayBackgroundThemeInput) {
    overlayBackgroundThemeInput.value = normalizeOverlayBackgroundTheme(overlayBackgroundTheme, transparentOverlay);
    toggleGlassConfigVisibility(overlayBackgroundThemeInput.value);
  }
  const normalizedGlassSettings = getNormalizedGlassSettings({
    glassBlurPx,
    glassTintColor,
    glassTintOpacity,
    glassBorderOpacity,
    glassShadowStrength
  });
  if (glassBlurPxInput) glassBlurPxInput.value = String(normalizedGlassSettings.blurPx);
  if (glassTintColorInput) glassTintColorInput.value = String(normalizedGlassSettings.tintColor);
  if (glassTintOpacityInput) glassTintOpacityInput.value = String(normalizedGlassSettings.tintOpacity);
  if (glassBorderOpacityInput) glassBorderOpacityInput.value = String(normalizedGlassSettings.borderOpacity);
  if (glassShadowStrengthInput) glassShadowStrengthInput.value = String(normalizedGlassSettings.shadowStrength);
  if (glassTintColorInput && glassTintColorButton) setColorCircleButtonValue(glassTintColorButton, glassTintColorInput.value);
  updateGlassRangeValueBubbles();
  if (showConnectionInput && typeof showConnection === "boolean") showConnectionInput.checked = showConnection;
  if (showLastUpdatedInput && typeof showLastUpdated === "boolean") showLastUpdatedInput.checked = showLastUpdated;
  if (showAgentIconsInput && typeof showAgentIconsValue === "boolean") showAgentIconsInput.checked = showAgentIconsValue;
  showAgentIcons = showAgentIconsValue !== false;
  maxMatchResults = clampMatchResults(configuredMaxMatchResults);
  if (maxMatchResultsInput) maxMatchResultsInput.value = String(maxMatchResults);
  if (trackingDayResetTimeInput) {
    populateTrackingResetTimeOptions(trackingDayResetTime);
  }
  if (playerNameInput) playerNameInput.value = player?.name || "";
  if (playerTagInput) playerTagInput.value = player?.tag || "";
  if (playerRegionInput) playerRegionInput.value = player?.region || "ap";
  hasConfiguredApiKey = Boolean(hasApiKey);
  setApiKeyFieldMaskState(hasConfiguredApiKey);
  setApiKeyVisibility(false);
  syncConfigPanelLayout();
}

async function fetchWithFallback(pathOrUrl, options) {
  const candidates = getCandidateUrls(pathOrUrl);
  let firstResponse = null;
  let lastError = null;

  for (const candidate of candidates) {
    try {
      const response = await fetch(candidate, options);
      if (response.ok) {
        lastConnectedOrigin = new URL(candidate).origin;
        return response;
      }
      if (!firstResponse) {
        firstResponse = response;
      }
    } catch (error) {
      lastError = error;
    }
  }

  if (firstResponse) {
    return firstResponse;
  }

  throw lastError || new Error("Unable to connect to overlay server");
}

function loadConfig() {
  fetchWithFallback(CONFIG_PATH, { cache: "no-store" })
    .then(res => res.json())
    .then(data => {
      setConfigInputs(
        data.backgroundColor,
        data.textColor,
        data.borderStyle,
        data.overlayBackgroundTheme,
        data.transparentOverlay,
        data.glassBlurPx,
        data.glassTintColor,
        data.glassTintOpacity,
        data.glassBorderOpacity,
        data.glassShadowStrength,
        data.showConnection,
        data.showLastUpdated,
        data.showAgentIcons,
        data.maxMatchResults,
        data.trackingDayResetTime,
        data.player,
        data.hasApiKey
      );
      applyTheme(data.backgroundColor, data.textColor, data.borderStyle, data.overlayBackgroundTheme, data.transparentOverlay, {
        glassBlurPx: data.glassBlurPx,
        glassTintColor: data.glassTintColor,
        glassTintOpacity: data.glassTintOpacity,
        glassBorderOpacity: data.glassBorderOpacity,
        glassShadowStrength: data.glassShadowStrength
      });
      const showConnectionValue = typeof data.showConnection === "boolean"
        ? data.showConnection
        : document.getElementById("showConnectionInput")?.checked;
      const showLastUpdatedValue = typeof data.showLastUpdated === "boolean"
        ? data.showLastUpdated
        : document.getElementById("showLastUpdatedInput")?.checked;
      applyStatusVisibility(showConnectionValue, showLastUpdatedValue);
    })
    .catch(() => {
      const statusEl = document.getElementById("saveStatus");
      if (statusEl) {
        statusEl.textContent = "Unable to load config. Start server and use http://127.0.0.1:3000 in OBS.";
        statusEl.classList.add("error");
      }
    });
}

function saveConfig() {
  const backgroundColor = document.getElementById("bgColorInput").value;
  const textColor = document.getElementById("textColorInput").value;
  const borderStyle = document.getElementById("borderStyleInput")?.value || DEFAULT_BORDER_STYLE;
  const overlayBackgroundTheme = normalizeOverlayBackgroundTheme(document.getElementById("overlayBackgroundThemeInput")?.value, false);
  const transparentOverlay = overlayBackgroundTheme === "transparent";
  const glassBlurPx = clampNumber(document.getElementById("glassBlurPxInput")?.value, 4, 20, DEFAULT_GLASS_BLUR_PX);
  const glassTintColor = normalizeHexColor(document.getElementById("glassTintColorInput")?.value) || DEFAULT_GLASS_TINT_COLOR;
  const glassTintOpacity = clampNumber(document.getElementById("glassTintOpacityInput")?.value, 0.05, 0.75, DEFAULT_GLASS_TINT_OPACITY);
  const glassBorderOpacity = clampNumber(document.getElementById("glassBorderOpacityInput")?.value, 0.12, 0.7, DEFAULT_GLASS_BORDER_OPACITY);
  const glassShadowStrength = clampNumber(document.getElementById("glassShadowStrengthInput")?.value, 0.2, 0.8, DEFAULT_GLASS_SHADOW_STRENGTH);
  const showConnection = document.getElementById("showConnectionInput").checked;
  const showLastUpdated = document.getElementById("showLastUpdatedInput").checked;
  const showAgentIconsValue = document.getElementById("showAgentIconsInput").checked;
  const maxMatchResultsValue = clampMatchResults(document.getElementById("maxMatchResultsInput").value);
  const trackingDayResetTimeValue = normalizeTrackingResetTime(document.getElementById("trackingDayResetTimeInput")?.value || "");
  const playerName = document.getElementById("playerNameInput").value.trim();
  const playerTag = document.getElementById("playerTagInput").value.trim();
  const playerRegion = document.getElementById("playerRegionInput").value;
  const apiKeyInput = document.getElementById("apiKeyInput");
  const apiKey = (apiKeyInput?.value || "").trim();
  const isMaskedApiValue = apiKeyInput?.dataset.masked === "true";
  const statusEl = document.getElementById("saveStatus");

  if (!statusEl) return;
  statusEl.classList.remove("error", "success");
  statusEl.textContent = "Saving...";

  if (!playerName || !playerTag || !playerRegion) {
    statusEl.textContent = "Player name, tag, and region are required";
    statusEl.classList.add("error");
    return;
  }

  if (!trackingDayResetTimeValue) {
    statusEl.textContent = "Day reset time must be HH:MM (24h)";
    statusEl.classList.add("error");
    return;
  }

  if (!hasConfiguredApiKey && !apiKey) {
    statusEl.textContent = "API key is required for first-time setup";
    statusEl.classList.add("error");
    return;
  }

  const payload = {
    backgroundColor,
    textColor,
    borderStyle,
    overlayBackgroundTheme,
    glassBlurPx,
    glassTintColor,
    glassTintOpacity,
    glassBorderOpacity,
    glassShadowStrength,
    transparentOverlay,
    showConnection,
    showLastUpdated,
    showAgentIcons: showAgentIconsValue,
    maxMatchResults: maxMatchResultsValue,
    trackingDayResetTime: trackingDayResetTimeValue,
    player: { name: playerName, tag: playerTag, region: playerRegion }
  };
  if (apiKey && !isMaskedApiValue) {
    payload.apiKey = apiKey;
  }

  fetchWithFallback(CONFIG_PATH, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  })
    .then(res => res.json())
    .then(data => {
      if (data.success) {
        statusEl.textContent = "Saved!";
        statusEl.classList.add("success");
        hasConfiguredApiKey = Boolean(data.hasApiKey);
        setApiKeyFieldMaskState(hasConfiguredApiKey);
        setApiKeyVisibility(false);
        applyTheme(backgroundColor, textColor, borderStyle, overlayBackgroundTheme, transparentOverlay, {
          glassBlurPx,
          glassTintColor,
          glassTintOpacity,
          glassBorderOpacity,
          glassShadowStrength
        });
        applyStatusVisibility(showConnection, showLastUpdated);
        showAgentIcons = showAgentIconsValue;
        maxMatchResults = maxMatchResultsValue;
      } else {
        statusEl.textContent = data.error || "Save failed";
        statusEl.classList.add("error");
      }
      setTimeout(() => {
        statusEl.textContent = "Ready";
        statusEl.classList.remove("error", "success");
      }, 2500);
    })
    .catch(() => {
      statusEl.textContent = "Network error";
      statusEl.classList.add("error");
      setTimeout(() => {
        statusEl.textContent = "Ready";
        statusEl.classList.remove("error", "success");
      }, 2500);
    });
}

function updateProgressBar(rr) {
  const fill = document.getElementById("progressFill");
  const value = Math.max(0, Math.min(100, rr));
  fill.style.width = `${value}%`;
}

function setStatus(message, state) {
  const statusEl = document.getElementById("status");
  statusEl.textContent = message;
  statusEl.className = `status ${state}`;
}

function updateRRValue(value, direction = "") {
  const el = document.getElementById("rr");
  el.textContent = `${value} RR`;
  el.style.color = direction === "up" ? "#4cff9a" : direction === "down" ? "#ff5c5c" : "#eef2ff";
  updateProgressBar(value);
}

function animateRR(newRR) {
  if (displayedRR === null) {
    displayedRR = newRR;
    updateRRValue(newRR);
    return;
  }

  targetRR = newRR;
  if (rrAnimationFrame) return;

  function tick() {
    if (displayedRR === targetRR) {
      rrAnimationFrame = null;
      return;
    }

    const diff = targetRR - displayedRR;
    const step = Math.sign(diff) * Math.max(1, Math.min(4, Math.ceil(Math.abs(diff) / 10)));
    displayedRR += step;
    const direction = step > 0 ? "up" : "down";
    updateRRValue(displayedRR, direction);
    rrAnimationFrame = requestAnimationFrame(tick);
  }

  tick();
}

function formatTimestamp(timestamp) {
  if (!timestamp) return "--";
  const date = new Date(timestamp);
  if (Number.isNaN(date.getTime())) return "--";
  return date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
}

function applyIdVisibility(show) {
  const divisionEl = document.getElementById("division");
  if (divisionEl) divisionEl.style.display = show ? "" : "none";
}

function renderMatches(matches) {
  const historyEl = document.getElementById("history");
  const historyRowEl = historyEl ? historyEl.closest(".history-row") : null;
  if (!historyEl) return;
  historyEl.innerHTML = "";
  if (!Array.isArray(matches) || matches.length === 0) {
    if (historyRowEl) historyRowEl.style.display = "none";
    syncConfigPanelLayout();
    return;
  }

  if (historyRowEl) historyRowEl.style.display = "";

  const displayMatches = [...matches].slice(0, maxMatchResults).reverse();
  displayMatches.forEach(entry => {
    const points = typeof entry.points === "number" ? entry.points : null;
    const text = points === null
      ? "--"
      : `${points > 0 ? "+" : ""}${points}`;
    const state = points === null
      ? entry.result === "W" ? "gain" : "loss"
      : points > 0 ? "gain" : points < 0 ? "loss" : "neutral";

    const item = document.createElement("div");
    item.className = `history-item ${state}`;

    const valueEl = document.createElement("span");
    valueEl.className = "history-value";
    valueEl.textContent = text;
    item.appendChild(valueEl);

    item.title = points === null
      ? `${entry.result === "W" ? "Win" : "Loss"}${entry.agentName ? ` • ${entry.agentName}` : ""}`
      : `${entry.result === "W" ? "Win" : "Loss"} ${text}${entry.agentName ? ` • ${entry.agentName}` : ""}`;
    historyEl.appendChild(item);
  });
  syncConfigPanelLayout();
}

function renderAgentHistory(matches) {
  const rowEl = document.getElementById("agentRow");
  const historyEl = document.getElementById("agentHistory");
  if (!rowEl || !historyEl) return;

  historyEl.innerHTML = "";
  const entries = Array.isArray(matches) ? matches.slice(0, LAST_AGENT_COUNT) : [];
  if (!showAgentIcons || entries.length === 0) {
    rowEl.style.display = "none";
    syncConfigPanelLayout();
    return;
  }

  rowEl.style.display = "";

  entries.forEach((entry) => {
    const item = document.createElement("div");
    item.className = "agent-item";
    item.title = entry.agentName || "Agent";

    if (entry.agentIcon) {
      const img = document.createElement("img");
      img.src = entry.agentIcon;
      img.alt = entry.agentName || "Agent";
      img.loading = "lazy";
      item.appendChild(img);
    }

    historyEl.appendChild(item);
  });
  syncConfigPanelLayout();
}

async function fetchRank() {
  try {
    const res = await fetchWithFallback(API_PATH, { cache: "no-store" });
    if (!res.ok) {
      throw new Error(`HTTP ${res.status}`);
    }
    const json = await res.json();

    if (!json || typeof json !== "object") {
      throw new Error("Invalid overlay payload");
    }

    const hasPayloadTheme = typeof json.overlayBackgroundTheme === "string" && json.overlayBackgroundTheme.trim() !== "";
    const payloadTheme = hasPayloadTheme
      ? normalizeOverlayBackgroundTheme(json.overlayBackgroundTheme, json.transparentOverlay)
      : currentOverlayBackgroundTheme;
    const payloadGlassSettings = {
      glassBlurPx: Number.isFinite(Number(json.glassBlurPx)) ? Number(json.glassBlurPx) : currentGlassSettings.blurPx,
      glassTintColor: normalizeHexColor(json.glassTintColor) || currentGlassSettings.tintColor,
      glassTintOpacity: Number.isFinite(Number(json.glassTintOpacity)) ? Number(json.glassTintOpacity) : currentGlassSettings.tintOpacity,
      glassBorderOpacity: Number.isFinite(Number(json.glassBorderOpacity)) ? Number(json.glassBorderOpacity) : currentGlassSettings.borderOpacity,
      glassShadowStrength: Number.isFinite(Number(json.glassShadowStrength)) ? Number(json.glassShadowStrength) : currentGlassSettings.shadowStrength
    };

    applyTheme(
      typeof json.backgroundColor === "string" ? json.backgroundColor : currentBackgroundColor,
      typeof json.textColor === "string" ? json.textColor : currentTextColor,
      typeof json.borderStyle === "string" ? json.borderStyle : currentBorderStyle,
      payloadTheme,
      json.transparentOverlay,
      payloadGlassSettings
    );
    document.getElementById("lastUpdated").textContent = `Last updated: ${formatTimestamp(json.lastUpdated)}`;

    if (!json.rank) {
      const state = json.status === "offline" ? "offline" : "loading";
      const message = json.status === "offline" ? "Offline" : "Connecting...";
      setStatus(message, state);
      renderMatches(json.matches || []);
      showAgentIcons = json.showAgentIcons !== false;
      renderAgentHistory(json.matches || []);
      return;
    }

    rankImageBasePath = json.imagePath || DEFAULT_IMAGE_PATH;
    const tier = json.rank.currenttierpatched || "Unknown";
    const rr = Number(json.rank.ranking_in_tier) || 0;

    document.getElementById("rank").textContent = tier;
    const rankImgEl = document.getElementById("rankImg");
    const rankIconUrl = resolveRankIconUrl(json.rank, rankImageBasePath, tier);
    const remoteFallback = json.rank?.images?.large || json.rank?.images?.small || "";
    rankImgEl.onerror = () => {
      if (remoteFallback && rankImgEl.src !== remoteFallback) {
        rankImgEl.src = remoteFallback;
        return;
      }
      rankImgEl.onerror = null;
    };
    rankImgEl.src = rankIconUrl;

    if (displayedRR === null) {
      displayedRR = rr;
      updateRRValue(rr);
    } else {
      animateRR(rr);
    }

    if (!lastTier || tier !== lastTier) {
      animateRankIcon();
    }
    lastTier = tier;

    const animationIntervalSeconds = Number(json.rankAnimationIntervalSec);
    scheduleRankAnimation(Number.isFinite(animationIntervalSeconds) && animationIntervalSeconds > 0
      ? animationIntervalSeconds * 1000
      : 15000);

    document.getElementById("division").textContent = `${json.player?.name || "Player"}#${json.player?.tag || "0000"}`;
    applyIdVisibility(json.showPlayerId !== false);
    applyStatusVisibility(json.showConnection, json.showLastUpdated);
    showAgentIcons = json.showAgentIcons !== false;
    maxMatchResults = clampMatchResults(json.maxMatchResults);
    setStatus(json.status === "online" ? "Live" : "Offline", json.status || "loading");
    renderAgentHistory(json.matches);
    renderMatches(json.matches);
  } catch (error) {
    setStatus("Disconnected", "offline");
    document.getElementById("lastUpdated").textContent = `Last updated: ${formatTimestamp(null)}`;
    const statusEl = document.getElementById("saveStatus");
    if (statusEl) {
      statusEl.textContent = `Cannot reach server on 127.0.0.1/localhost:3000 (${error.message})`;
      statusEl.classList.add("error");
    }
    console.error("Overlay fetch error:", error.message);
  }
}

currentOverlayBackgroundTheme = getSavedThemeFromStorage();
if (isOverlayOnlyMode() || isObsBrowser()) {
  document.documentElement.classList.add("overlay-only");
  document.body.classList.add("overlay-only");
  if (isObsBrowser()) {
    document.documentElement.classList.add("obs-browser");
    document.body.classList.add("obs-browser");
  }
  if (shouldForceTransparentPanelInOverlayOnlyMode()) {
    document.body.classList.add("overlay-only-force-transparent-panel");
  }
}
applyTheme(DEFAULT_BG_COLOR, DEFAULT_TEXT_COLOR, DEFAULT_BORDER_STYLE, currentOverlayBackgroundTheme, false, currentGlassSettings);
initializeColorCircleButtons();
populateTrackingResetTimeOptions(DEFAULT_TRACKING_RESET_TIME);
toggleGlassConfigVisibility(currentOverlayBackgroundTheme);
updateGlassRangeValueBubbles();
syncConfigPanelLayout();
loadConfig();
fetchRank();
setInterval(fetchRank, 5000);
document.getElementById("saveConfigBtn").addEventListener("click", saveConfig);
const apiKeyInput = document.getElementById("apiKeyInput");
const apiKeyVisibilityBtn = document.getElementById("apiKeyVisibilityBtn");
if (apiKeyInput) {
  apiKeyInput.addEventListener("focus", () => {
    if (apiKeyInput.dataset.masked === "true") {
      setApiKeyFieldMaskState(false);
    }
  });
  apiKeyInput.addEventListener("input", () => {
    if ((apiKeyInput.value || "").trim() !== "") {
      apiKeyInput.dataset.masked = "false";
    }
  });
}
if (apiKeyVisibilityBtn) {
  apiKeyVisibilityBtn.addEventListener("click", () => {
    const visible = apiKeyInput?.type === "text";
    setApiKeyVisibility(!visible);
  });
}
["overlayBackgroundThemeInput"].forEach((id) => {
  const input = document.getElementById(id);
  if (!input) return;
  input.addEventListener("change", () => {
    toggleGlassConfigVisibility(input.value);
    previewThemeFromInputs();
  });
});
["glassBlurPxInput", "glassTintOpacityInput", "glassBorderOpacityInput", "glassShadowStrengthInput"].forEach((id) => {
  const input = document.getElementById(id);
  if (!input) return;
  input.addEventListener("input", () => {
    updateGlassRangeValueBubbles();
    previewThemeFromInputs();
  });
});

window.addEventListener("resize", syncConfigPanelLayout);
</script>
